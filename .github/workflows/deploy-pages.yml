# Settings → Pages: use "GitHub Actions" as the source. Deploying the branch root
# serves unbuilt index.html (points at /src/main.tsx) and shows a blank page.
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - uses: actions/configure-pages@v4
      - run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_VIDEO_SOURCES: ${{ secrets.VITE_VIDEO_SOURCES }}
          VITE_GCS_PUBLIC_BASE_URL: ${{ secrets.VITE_GCS_PUBLIC_BASE_URL }}
          VITE_VIDEO_MANIFEST_PATH: ${{ secrets.VITE_VIDEO_MANIFEST_PATH }}
          VITE_GCS_USE_XML_LIST: ${{ secrets.VITE_GCS_USE_XML_LIST }}
          VITE_GCS_LIST_PREFIX: ${{ secrets.VITE_GCS_LIST_PREFIX }}
          VITE_VIDEO_CROSS_ORIGIN: ${{ secrets.VITE_VIDEO_CROSS_ORIGIN }}
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
